{% from 'components/ui/macros.html' import btn_close %}
<div class="modal fade wf-modal {{ modal_class|default('') }}" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_label_id }}" aria-hidden="true" data-bs-backdrop="{{ backdrop|default('true') }}" data-bs-keyboard="{{ keyboard|default('true') }}" data-modal-shell>
  <div class="modal-dialog wf-modal__dialog {{ dialog_class|default('') }} {{ 'modal-dialog-scrollable' if scrollable else '' }} {{ 'modal-xl' if size == 'xl' else 'modal-lg' if size == 'lg' else 'modal-sm' if size == 'sm' else '' }}">
    <div class="modal-content wf-modal__content">
      <div class="modal-header wf-modal__header {{ header_class|default('') }}">
        <h5 class="modal-title" id="{{ modal_label_id }}">{{ title | safe }}</h5>
        {{ btn_close('modal', close_aria_label|default('关闭'), close_button_class|default('')) }}
      </div>
      <div class="modal-body wf-modal__body {{ body_class|default('') }}">
        {{ body | safe }}
      </div>
      {% if footer %}
      <div class="modal-footer wf-modal__footer {{ footer_class|default('') }}">
        {{ footer | safe }}
      </div>
      {% endif %}
    </div>
  </div>
</div>
