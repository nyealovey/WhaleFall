<input type="hidden" id="jumpserver-source-csrf-token" value="{{ csrf_token() }}">
<div
    id="jumpserver-source-page"
    class="jumpserver-source-page"
    data-api-url="/api/v1/integrations/jumpserver/source"
    data-sync-api-url="/api/v1/integrations/jumpserver/actions/sync"
>
    <div class="jumpserver-source-layout">
        <section class="card jumpserver-source-card">
            <div class="card-header jumpserver-source-card__header">
                <div>
                    <h2 class="jumpserver-source-card__title">绑定配置</h2>
                </div>
            </div>
            <div class="card-body jumpserver-source-card__body">
                <div class="jumpserver-source-field">
                    <label for="jumpserverCredentialId" class="form-label">API 凭据</label>
                    <select id="jumpserverCredentialId" class="form-select">
                        <option value="">请选择 API 凭据</option>
                    </select>
                </div>

                <div class="jumpserver-source-field">
                    <label for="jumpserverBaseUrl" class="form-label">JumpServer URL</label>
                    <input id="jumpserverBaseUrl" class="form-control" type="url" placeholder="请输入 JumpServer URL">
                </div>

                <div class="jumpserver-source-field">
                    <div class="form-check form-switch">
                        <input id="jumpserverVerifySsl" class="form-check-input" type="checkbox" checked>
                        <label for="jumpserverVerifySsl" class="form-check-label">SSL 证书验证</label>
                    </div>
                    <div class="form-text">关闭后将跳过 JumpServer HTTPS 证书校验，适用于自签名证书环境。</div>
                </div>

                <div class="jumpserver-source-actions">
                    <button id="saveJumpserverSourceBtn" class="btn btn-primary" type="button">
                        <i class="fas fa-link me-2"></i>保存绑定
                    </button>
                    <button id="unbindJumpserverSourceBtn" class="btn btn-outline-secondary" type="button">
                        <i class="fas fa-link-slash me-2"></i>解绑数据源
                    </button>
                    <button id="syncJumpserverAssetsBtn" class="btn btn-outline-secondary" type="button">
                        <i class="fas fa-rotate me-2"></i>同步 JumpServer 资源
                    </button>
                </div>
            </div>
        </section>

        <section class="card jumpserver-source-card jumpserver-source-card--summary">
            <div class="card-header jumpserver-source-card__header">
                <div>
                    <h2 class="jumpserver-source-card__title">运行状态</h2>
                </div>
            </div>
            <div class="card-body jumpserver-source-card__body jumpserver-source-card__body--summary">
                <div class="jumpserver-summary-item">
                    <span class="jumpserver-summary-item__label">Provider</span>
                    <strong id="jumpserverProviderStatus">Provider 待接入</strong>
                </div>
                <div class="jumpserver-summary-item">
                    <span class="jumpserver-summary-item__label">当前绑定</span>
                    <strong id="jumpserverBindingSummary">当前未绑定 JumpServer API 凭据</strong>
                </div>
                <div class="jumpserver-summary-item">
                    <span class="jumpserver-summary-item__label">最近同步</span>
                    <strong id="jumpserverSyncStatusSummary">未执行同步</strong>
                </div>
            </div>
        </section>
    </div>
</div>
