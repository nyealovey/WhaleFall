<input type="hidden" id="email-alert-csrf-token" value="{{ csrf_token() }}">
<div
    id="email-alert-settings-page"
    class="email-alert-settings-page"
    data-api-url="/api/v1/alerts/email-settings"
    data-test-api-url="/api/v1/alerts/email-settings/actions/send-test"
>
    <div class="email-alert-settings-layout">
        <div class="email-alert-settings-column email-alert-settings-column--delivery">
            <section class="card email-alert-settings-card email-alert-settings-card--delivery">
                <div class="card-header email-alert-settings-card__header">
                    <div>
                        <h2 class="email-alert-settings-card__title">发送设置</h2>
                    </div>
                </div>
                <div class="card-body email-alert-settings-card__body">
                    <form id="email-alert-settings-form" class="email-alert-settings-form">
                        <section class="email-alert-setting-block">
                            <h3 class="email-alert-setting-block__title">总开关</h3>
                            <label class="email-alert-master-toggle" for="globalEnabled">
                                <input type="checkbox" id="globalEnabled" class="form-check-input mt-0">
                                <span class="email-alert-master-toggle__text">
                                    <strong>启用邮件告警</strong>
                                </span>
                            </label>
                        </section>

                        <section class="email-alert-setting-block">
                            <h3 class="email-alert-setting-block__title">收件人</h3>
                            <label class="form-label" for="recipientsInput">共享收件人列表</label>
                            <textarea
                                id="recipientsInput"
                                class="form-control"
                                rows="8"
                                placeholder="每行一个邮箱地址"
                            ></textarea>
                        </section>

                        <section class="email-alert-setting-block">
                            <h3 class="email-alert-setting-block__title">操作</h3>
                            <div class="email-alert-actions">
                                <button id="sendTestEmailBtn" class="btn btn-outline-secondary" type="button">
                                    <i class="fas fa-paper-plane me-2"></i>发送测试邮件
                                </button>
                                <button id="saveEmailAlertSettingsBtn" class="btn btn-primary" type="submit">
                                    <i class="fas fa-save me-2"></i>保存配置
                                </button>
                            </div>
                        </section>
                    </form>
                </div>
            </section>
        </div>

        <div class="email-alert-settings-column email-alert-settings-column--rules">
            <section class="card email-alert-settings-card email-alert-settings-card--rules" aria-label="规则设置">
                <div class="card-header email-alert-settings-card__header">
                    <div>
                        <h2 class="email-alert-settings-card__title">规则设置</h2>
                    </div>
                </div>
                <div class="card-body email-alert-settings-card__body">
                    <div class="email-alert-rule-list">
                        <section class="email-alert-rule-item" data-rule-card="databaseCapacity">
                            <div class="email-alert-rule-item__head">
                                <div>
                                    <h3>容量异常增长</h3>
                                </div>
                                <label class="email-alert-rule-toggle" for="databaseCapacityEnabled">
                                    <input type="checkbox" id="databaseCapacityEnabled" class="form-check-input mt-0">
                                    <span>启用</span>
                                </label>
                            </div>

                            <div class="email-alert-rule-item__status">
                                <span class="status-pill status-pill--muted" data-role="rule-status">
                                    <i class="fas fa-wave-square"></i>未启用
                                </span>
                            </div>

                            <div class="email-alert-threshold-grid">
                                <div>
                                    <label class="form-label" for="databaseCapacityPercentThreshold">增幅阈值 (%)</label>
                                    <input id="databaseCapacityPercentThreshold" class="form-control" type="number" min="1" step="1">
                                </div>
                                <div>
                                    <label class="form-label" for="databaseCapacityAbsoluteGbThreshold">增量阈值 (GB)</label>
                                    <input id="databaseCapacityAbsoluteGbThreshold" class="form-control" type="number" min="1" step="1">
                                </div>
                            </div>
                        </section>

                        <section class="email-alert-rule-item" data-rule-card="accountSyncFailure">
                            <div class="email-alert-rule-item__head">
                                <div>
                                    <h3>账户同步异常</h3>
                                </div>
                                <label class="email-alert-rule-toggle" for="accountSyncFailureEnabled">
                                    <input type="checkbox" id="accountSyncFailureEnabled" class="form-check-input mt-0">
                                    <span>启用</span>
                                </label>
                            </div>

                            <div class="email-alert-rule-item__status">
                                <span class="status-pill status-pill--muted" data-role="rule-status">
                                    <i class="fas fa-right-left"></i>未启用
                                </span>
                            </div>
                        </section>

                        <section class="email-alert-rule-item" data-rule-card="databaseSyncFailure">
                            <div class="email-alert-rule-item__head">
                                <div>
                                    <h3>数据库同步异常</h3>
                                </div>
                                <label class="email-alert-rule-toggle" for="databaseSyncFailureEnabled">
                                    <input type="checkbox" id="databaseSyncFailureEnabled" class="form-check-input mt-0">
                                    <span>启用</span>
                                </label>
                            </div>

                            <div class="email-alert-rule-item__status">
                                <span class="status-pill status-pill--muted" data-role="rule-status">
                                    <i class="fas fa-database"></i>未启用
                                </span>
                            </div>
                        </section>

                        <section class="email-alert-rule-item" data-rule-card="privilegedAccount">
                            <div class="email-alert-rule-item__head">
                                <div>
                                    <h3>高权限账户</h3>
                                </div>
                                <label class="email-alert-rule-toggle" for="privilegedAccountEnabled">
                                    <input type="checkbox" id="privilegedAccountEnabled" class="form-check-input mt-0">
                                    <span>启用</span>
                                </label>
                            </div>

                            <div class="email-alert-rule-item__status">
                                <span class="status-pill status-pill--muted" data-role="rule-status">
                                    <i class="fas fa-shield-alt"></i>未启用
                                </span>
                            </div>
                        </section>

                        <section class="email-alert-rule-item" data-rule-card="backupIssue">
                            <div class="email-alert-rule-item__head">
                                <div>
                                    <h3>备份告警</h3>
                                </div>
                                <label class="email-alert-rule-toggle" for="backupIssueEnabled">
                                    <input type="checkbox" id="backupIssueEnabled" class="form-check-input mt-0">
                                    <span>启用</span>
                                </label>
                            </div>

                            <div class="email-alert-rule-item__status">
                                <span class="status-pill status-pill--muted" data-role="rule-status">
                                    <i class="fas fa-hard-drive"></i>未启用
                                </span>
                            </div>
                        </section>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
