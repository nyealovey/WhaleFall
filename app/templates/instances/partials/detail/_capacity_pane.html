<!-- 容量信息标签页 -->
<div class="tab-pane fade instance-data-pane" id="capacity-pane" role="tabpanel" aria-labelledby="capacity-tab">
    <div class="instance-data-pane__stack">
        <div id="databaseSizesContent">
            <section class="instance-overview-band instance-overview-band--capacity">
                <div class="instance-overview-band__facts">
                    <article class="instance-overview-band__fact" data-tone="brand">
                        <div class="instance-overview-band__fact-header">
                            <span class="instance-overview-band__fact-label">当前数据库</span>
                            <span class="instance-overview-band__fact-icon" aria-hidden="true">
                                <i class="fas fa-database"></i>
                            </span>
                        </div>
                        <strong class="instance-overview-band__fact-value" id="databaseTotalCount">-</strong>
                        <span class="status-pill status-pill--muted">
                            <i class="fas fa-layer-group" aria-hidden="true"></i>当前结果
                        </span>
                    </article>

                    <article class="instance-overview-band__fact" data-tone="success">
                        <div class="instance-overview-band__fact-header">
                            <span class="instance-overview-band__fact-label">在线数据库</span>
                            <span class="instance-overview-band__fact-icon" aria-hidden="true">
                                <i class="fas fa-check-circle"></i>
                            </span>
                        </div>
                        <strong class="instance-overview-band__fact-value" id="databaseOnlineCount">-</strong>
                        <span class="status-pill status-pill--success">
                            <i class="fas fa-check" aria-hidden="true"></i>在线
                        </span>
                    </article>

                    <article class="instance-overview-band__fact" data-tone="danger">
                        <div class="instance-overview-band__fact-header">
                            <span class="instance-overview-band__fact-label">已删除数据库</span>
                            <span class="instance-overview-band__fact-icon" aria-hidden="true">
                                <i class="fas fa-trash"></i>
                            </span>
                        </div>
                        <strong class="instance-overview-band__fact-value" id="databaseDeletedCount">-</strong>
                        <span class="status-pill status-pill--danger">
                            <i class="fas fa-trash" aria-hidden="true"></i>已删除
                        </span>
                    </article>

                    <article class="instance-overview-band__fact" data-tone="info">
                        <div class="instance-overview-band__fact-header">
                            <span class="instance-overview-band__fact-label">总容量</span>
                            <span class="instance-overview-band__fact-icon" aria-hidden="true">
                                <i class="fas fa-hdd"></i>
                            </span>
                        </div>
                        <strong class="instance-overview-band__fact-value" id="databaseTotalCapacity">-</strong>
                        <span class="status-pill status-pill--info">
                            <i class="fas fa-hdd" aria-hidden="true"></i>容量
                        </span>
                    </article>
                </div>

                <div class="instance-overview-band__controls filter-band">
                    <form id="instance-databases-filter-form" action="#" class="instance-overview-band__toolbar filter-band__form">
                        <input type="hidden" name="latest_only" value="true">
                        <div class="form-check form-switch mb-0 instance-overview-band__toggle filter-band__toggle">
                            <input class="form-check-input" type="checkbox" role="switch" id="showDeletedDatabases"
                                   name="include_inactive"
                                   value="true"
                                   data-action="toggle-deleted-databases">
                            <label class="form-check-label" for="showDeletedDatabases">
                                <i class="fas fa-eye me-1"></i>显示已删除数据库
                            </label>
                        </div>
                        <div class="input-group input-group-sm instance-overview-band__search filter-band__field filter-band__field--lg">
                            <span class="input-group-text">
                                <i class="fas fa-search"></i>
                            </span>
                            <input type="text"
                                   class="form-control"
                                   id="databaseSearchInput"
                                   name="database_name"
                                   data-auto-submit
                                   placeholder="搜索数据库"
                                   autocomplete="off">
                        </div>
                    </form>
                    <div class="instance-overview-band__realtime filter-band__meta">
                        <span class="chip-outline chip-outline--muted"><i class="fas fa-info-circle me-1"></i>实时</span>
                    </div>
                </div>
            </section>

            <div id="instance-databases-grid" class="instance-data-grid"></div>
        </div>
    </div>
</div>
